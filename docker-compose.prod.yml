# Production stack on EC2 (API + PostgreSQL). Nginx runs on the host as reverse proxy.
version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pulse_db}
    volumes:
      - pulse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      retries: 10

  api:
    build: .
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse_db}?schema=public
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - pulse_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pulse_pgdata:
  pulse_uploads:
