# Local development stack: PostgreSQL + Pulse API
version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulse_password}
      POSTGRES_DB: ${POSTGRES_DB:-pulse_db}
    ports:
      - "5432:5432"
    volumes:
      - pulse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      retries: 10

  api:
    build: .
    container_name: pulse-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pulse:pulse_password@postgres:5432/pulse_db?schema=public
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pulse_pgdata:
